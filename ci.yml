pr:
  branches:
    include:
      - master
      - feature/*
      - release/*
      - hotfix/*

variables:
  - template: eng/variables.yaml

jobs:
  - template: eng/build-job.yaml
    parameters:
      ArtifactName: 'packages'
      ProfileFlag: '-Djava-lts'
      JavaVersion: '1.11'
  - template: eng/test-job.yaml